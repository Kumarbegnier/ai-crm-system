men<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI HCP CRM Chat</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Full App.css styles here */
    body { margin: 0; font-family: "Inter", sans-serif; background: linear-gradient(135deg, #fdfbfb, #ebedee); }
    .chat-container { max-width: 800px; margin: 40px auto; padding: 20px; }
    h1 { text-align: center; font-weight: 600; color: #333; }
    .chat-box { height: 450px; overflow-y: auto; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .msg { display: flex; align-items: flex-end; margin: 10px 0; }
    .msg.user { justify-content: flex-end; }
    .msg.ai { justify-content: flex-start; }
    .avatar { margin: 0 8px; font-size: 18px; }
    .bubble { padding: 12px 16px; border-radius: 16px; max-width: 65%; font-size: 14px; line-height: 1.4; position: relative; }
    .bubble::after { content: '|'; animation: blinkCursor 1s infinite; margin-left: 3px; }
    @keyframes blinkCursor { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0; } }
    .user .bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .ai .bubble { background: #f1f3f5; }
    .input-box { display: flex; margin-top: 15px; background: white; border-radius: 30px; padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .input-box input { flex: 1; border: none; outline: none; padding: 12px; border-radius: 30px; font-size: 14px; }
    .input-box button { border: none; background: linear-gradient(135deg, #ff9a9e, #fad0c4); color: #333; padding: 10px 18px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
    .input-box button:hover { transform: scale(1.05); }
    .typing { display: flex; gap: 5px; }
    .typing span { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    .scroll-btn { position: fixed; bottom: 80px; right: 20px; padding: 8px 12px; border-radius: 20px; border: none; background: #333; color: white; cursor: pointer; }
    .dark body { background: #0f172a; color: white; }
    .dark .chat-box { background: #1e293b; }
    .dark .ai .bubble { background: #334155; color: white; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [ws, setWs] = useState(null);
      const [loading, setLoading] = useState(false);
      const [dark, setDark] = useState(false);
      const chatBoxRef = useRef(null);
      const isUserNearBottom = useRef(true);

      useEffect(() => {
        document.body.className = dark ? 'dark' : '';
        const saved = localStorage.getItem('chat');
        if (saved) setMessages(JSON.parse(saved));
      }, []);

      useEffect(() => {
        localStorage.setItem('chat', JSON.stringify(messages));
      }, [messages]);

      useEffect(() => {
        const socket = new WebSocket('ws://127.0.0.1:8000/ws');
        socket.onmessage = (event) => {
          const text = event.data;
          setMessages(prev => {
            const last = prev[prev.length - 1];
            if (last && last.role === 'ai') {
              last.text += text;
              return [...prev.slice(0, -1), last];
            }
            return [...prev, { role: 'ai', text }];
          });
        };
        setWs(socket);
        return () => socket.close();
      }, []);

      const handleScroll = () => {
        const el = chatBoxRef.current;
        isUserNearBottom.current = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
      };

      useEffect(() => {
        if (isUserNearBottom.current) {
          chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
        }
      }, [messages]);

      const sendMessage = () => {
        if (!input.trim() || !ws) return;
        setMessages(prev => [...prev, { role: 'user', text: input }]);
        ws.send(input);
        setInput('');
      };

      return (
        <div className="chat-container">
          <h1>AI HCP CRM 🤖</h1>
          <button onClick={() => setDark(!dark)} style={{float: 'right', padding: '5px 10px', borderRadius: '5px'}}>🌙</button>
          <div className="chat-box" ref={chatBoxRef} onScroll={handleScroll}>
            {messages.map((msg, i) => (
              <div key={i} className={`msg ${msg.role}`}>
                <span className="avatar">{msg.role === 'user' ? '👤' : '🤖'}</span>
                <div className="bubble">{msg.text}<small>{new Date().toLocaleTimeString()}</small></div>
              </div>
            ))}
            {loading && (
              <div className="msg ai">
                <span className="avatar">🤖</span>
                <div className="bubble typing">
                  <span></span><span></span><span></span>
                </div>
              </div>
            )}
            {!isUserNearBottom.current && <button className="scroll-btn">↓</button>}
          </div>
          <div className="input-box">
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
              placeholder="Talk to CRM agent..."
            />
            <button onClick={sendMessage}>Send</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
